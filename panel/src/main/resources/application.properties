server.port=8080
spring.mvc.pathmatch.matching-strategy=PATH_PATTERN_PARSER
spring.main.allow-bean-definition-overriding=true

auditpanel.kafka.enabled=false
auditpanel.kafka.topic=panel-auditoria-logs
spring.kafka.consumer.group-id=panel-auditoria-group

auditpanel.elasticsearch.enabled=false
auditpanel.elasticsearch.index=panel-auditoria-logs
spring.elasticsearch.rest.uris=http://localhost:9200

# Persistencia SQL (Postgres) - deshabilitada por defecto
auditpanel.sql.enabled=false
# Para habilitar la persistencia SQL, activa el perfil `sql` y define
# los ajustes de conexión en `src/main/resources/application-sql.properties`.

# Deteccion de anomalias bancarias
auditpanel.banking.enabled=true
auditpanel.banking.smurfing-threshold=9000.0
auditpanel.banking.bulk-threshold=10
