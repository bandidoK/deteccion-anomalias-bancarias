# Perfil SQL para habilitar la persistencia Postgres
# Actívalo con el perfil `sql`:
# mvn spring-boot:run -Dspring-boot.run.profiles=sql
# o con Spring Boot Run en VS Code usando `-Dspring-boot.run.profiles=sql`.

auditpanel.sql.enabled=true
spring.datasource.url=jdbc:postgresql://localhost:5432/panel_auditoria
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Broadcast/polling
auditpanel.broadcast.poll-interval-ms=1000
auditpanel.sql.use-pg-notify=true
auditpanel.sql.pg-notify-channel=anomalies_channel

# Security defaults (usa variables de entorno si las defines)
AUDITPANEL_USER=${AUDITPANEL_USER:admin}
AUDITPANEL_PASSWORD=${AUDITPANEL_PASSWORD:change-me}
